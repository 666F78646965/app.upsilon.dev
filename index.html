<!DOCTYPE html>
<html lang="grok">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>app.upsilon.dev</title>
    <style>
        :root { --neon-primary: #00d4ff; --neon-secondary: #00eaff; --matrix-color: #00d4ff; }
        body { margin:0; height:100vh; background:#000; overflow:hidden; display:flex; justify-content:center; align-items:center; transition:filter 0.12s linear; }
        svg { width:100%; height:100%; position:relative; z-index:2; }
        .glow { fill:var(--neon-primary); filter:drop-shadow(0 0 6px var(--neon-primary)) drop-shadow(0 0 12px var(--neon-primary)); }
        .wave { stroke:var(--neon-primary); stroke-width:4.5; fill:none; stroke-linecap:round; filter:drop-shadow(0 0 10px var(--neon-primary)); }
        .mask-container { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:320px; height:420px; z-index:5; pointer-events:none; animation:float 18s ease-in-out infinite; opacity:0.8; filter:drop-shadow(0 0 50px #00d4ff66) brightness(1.2) contrast(1.25); }
        @keyframes float { 0%,100%{transform:translate(-50%,-52%) translateY(0);} 50%{transform:translate(-50%,-48%) translateY(-35px);} }
        .mask { width:100%; height:100%; background:url('https://files.catbox.moe/0q3z1k.png') center/contain no-repeat; filter:hue-rotate(190deg) saturate(3) brightness(1.15); animation:pulse-blue 7s ease-in-out infinite; mix-blend-mode:screen; }
        @keyframes pulse-blue { 0%,100%{opacity:0.75;filter:hue-rotate(190deg) saturate(3) brightness(1.15);} 50%{opacity:1;filter:hue-rotate(205deg) saturate(4) brightness(1.4);} }
        .diamond-btn { position:absolute; bottom:40px; left:50%; transform:translateX(-50%) rotate(45deg); width:160px; height:160px; z-index:10; background:linear-gradient(135deg,rgba(0,212,255,0.15)0%,rgba(0,212,255,0.05)100%); border:2px solid var(--neon-primary); box-shadow:inset 0 0 30px rgba(0,212,255,0.3),0 0 40px rgba(0,212,255,0.45); backdrop-filter:blur(8px); overflow:hidden; cursor:pointer; transition:all 0.4s cubic-bezier(0.23,1,0.32,1); }
        .diamond-btn:hover { transform:translateX(-50%) rotate(45deg) scale(1.15); filter:brightness(1.35) drop-shadow(0 0 50px var(--neon-primary)); }
        .diamond-inner::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,var(--neon-secondary)55%,transparent); animation:scan 4s linear infinite; }
        @keyframes scan { 0%{transform:translateX(-100%);} 100%{transform:translateX(100%);} }
        .diamond-content { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; color:var(--neon-secondary); font-family:'Courier New',monospace; font-size:18px; font-weight:700; letter-spacing:1px; transform:rotate(-45deg); text-shadow:0 0 12px var(--neon-primary); pointer-events:none; }
        .upsilon-big { font-size:42px; font-weight:900; line-height:0.9; margin-bottom:4px; }
        .navbar { position:fixed; top:0; left:0; width:100%; background:rgba(0,0,0,0.7); padding:10px 0; text-align:center; z-index:20; box-shadow:0 0 20px rgba(0,212,255,0.3); }
        .nav-input { background:#000; border:1px solid var(--neon-primary); color:var(--neon-secondary); padding:8px 16px; width:60%; max-width:600px; font-family:'Courier New',monospace; font-size:16px; box-shadow:0 0 10px var(--neon-primary); }
        .commands { position:fixed; top:50px; left:0; width:100%; display:flex; justify-content:center; flex-wrap:wrap; z-index:19; padding:10px 0; }
        .command { cursor:pointer; margin:5px 10px; color:var(--neon-primary); font-family:'Courier New',monospace; font-size:14px; text-shadow:0 0 8px var(--neon-primary); transition:transform 0.2s,filter 0.08s; }
        .command:hover { transform:scale(1.12); filter:brightness(1.6); }
        .command:active { filter:brightness(2.8); transform:scale(0.95); }
        .dialog { position:fixed; inset:0; background:rgba(0,0,0,0.92); display:none; justify-content:center; align-items:center; z-index:30; }
        .dialog-content { background:#0a0a1a; border:2px solid var(--neon-primary); padding:30px; max-width:600px; color:var(--neon-secondary); font-family:'Courier New',monospace; text-align:center; box-shadow:0 0 40px rgba(0,212,255,0.4); position:relative; transform:scale(0.88); transition:transform 0.18s cubic-bezier(0.23,1,0.32,1); }
        .dialog.open .dialog-content { transform:scale(1); }
        .dialog-close { position:absolute; top:10px; right:15px; font-size:24px; cursor:pointer; color:var(--neon-primary); }
        .dialog-text { white-space:pre-wrap; margin:20px 0; font-size:16px; word-break:break-all; }
        .dialog-btn { background:transparent; border:1px solid var(--neon-primary); color:var(--neon-secondary); padding:10px 24px; font-family:'Courier New',monospace; cursor:pointer; margin-top:15px; transition:all 0.3s; }
        .dialog-btn:hover { background:rgba(0,212,255,0.15); }
        .matrix-rain { position:fixed; inset:0; background:#000; pointer-events:none; z-index:0; }
        .matrix-column { position:absolute; top:0; height:100%; font-family:monospace; font-size:14px; line-height:1; color:var(--matrix-color); text-shadow:0 0 4px var(--matrix-color); white-space:nowrap; overflow:hidden; animation:matrix-fall linear infinite; text-align:right; }
        .matrix-column span { display:block; }
        .matrix-column .bright { color:#00ffff; text-shadow:0 0 8px #00ffff; }
        @keyframes matrix-fall { from{transform:translateY(-100vh);} to{transform:translateY(100vh);} }
        .electric-flash { animation: electric 0.2s linear; }
        @keyframes electric { 0%,100% { filter: brightness(1) hue-rotate(0deg); } 50% { filter: brightness(2.5) hue-rotate(80deg); } }
    </style>
</head>
<body>
    <div class="navbar"><input type="text" class="nav-input" placeholder="Enter command..." id="commandInput"></div>
    <div class="commands" id="commandsList"></div>
    <div class="dialog" id="dialog">
        <div class="dialog-content">
            <span class="dialog-close" onclick="closeDialog()">×</span>
            <div class="dialog-text" id="dialogText"></div>
            <button class="dialog-btn" id="copyBtn" style="display:none;">Copy</button>
        </div>
    </div>
    <svg viewBox="0 0 1400 1000" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" id="mainSVG">
        <defs>
            <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="10"/><feOffset dy="14"/><feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="neon"><feGaussianBlur stdDeviation="1.8" result="blur"/><feFlood flood-color="#00d4ff"/><feComposite in2="blur" operator="in" result="glow"/><feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <text x="380" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="680" font-weight="900" fill="#222222" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)">𝕏</text>
        <g transform="translate(820,400)" filter="url(#neon)"><text font-family="system-ui,-apple-system,sans-serif" font-size="180" font-weight="800" text-anchor="middle" dominant-baseline="middle"><tspan fill="#00d4ff" class="glow">-</tspan><tspan fill="#444444">risk</tspan><tspan fill="#00d4ff" class="glow">/</tspan></text></g>
        <g transform="translate(600,780)" filter="url(#neon)"><text id="grokText" font-family="system-ui,-apple-system,sans-serif" font-size="140" font-weight="800" text-anchor="middle" dominant-baseline="middle" letter-spacing="12" fill="#00d4ff" class="glow">GROK</text>
            <g>
                <path class="wave" d="M -380 -140 Q -190 -280 0 -140 T 380 -140"><animate attributeName="d" values="M -380 -140 Q -190 -280 0 -140 T 380 -140;M -380 -100 Q -190 -360 0 -100 T 380 -100;M -380 -140 Q -190 -280 0 -140 T 380 -140" dur="2.5s" repeatCount="indefinite" calcMode="linear"/></path>
                <path class="wave" d="M -340 -100 Q -170 -240 0 -100 T 340 -100" begin="0.3s"><animate attributeName="d" values="M -340 -100 Q -170 -240 0 -100 T 340 -100;M -340 -60 Q -170 -320 0 -60 T 340 -60;M -340 -100 Q -170 -240 0 -100 T 340 -100" dur="2.8s" repeatCount="indefinite" calcMode="linear"/></path>
                <path class="wave" d="M -300 -60 Q -150 -200 0 -60 T 300 -60" begin="0.6s"><animate attributeName="d" values="M -300 -60 Q -150 -200 0 -60 T 300 -60;M -300 -20 Q -150 -280 0 -20 T 300 -20;M -300 -60 Q -150 -200 0 -60 T 300 -60" dur="3.1s" repeatCount="indefinite" calcMode="linear"/></path>
            </g>
        </g>
    </svg>
    <div class="mask-container"><div class="mask"></div></div>
    <a href="https://x-risk.upsilon.dev" class="diamond-btn" target="_blank" rel="noopener"><div class="diamond-inner"><div class="diamond-content"><div class="upsilon-big">Υ</div>upsilon.dev</div></div></a>

    <div class="dialog" id="arcadeDialog">
        <div class="dialog-content">
            <span class="dialog-close" onclick="closeArcadeDialog()">×</span>
            <div class="dialog-text" id="arcadeText">ENTER THE MATRIX ARCADE?</div>
            <button class="dialog-btn" onclick="window.open('https://game.upsilon.dev','_blank');closeArcadeDialog()">PLAY</button>
        </div>
    </div>

    <div class="matrix-rain" id="matrixRain"></div>
    <div class="particles" id="particles"></div>

    <audio id="myAudio" loop>
        <source src="raindrop.mp3" type="audio/mpeg">
    </audio>

    <input type="color" id="themeColorPicker" style="display:none;">

    <script>
        let audioCtx = null;
        let matrixContainer = null;
        let matrixSound = null;
        let rainDensity = 1;
        let inMatrixMode = false;
        let redPillCount = 0;
        let foxdieClicks = 0;
        let psychoCount = 0;
        let originalNeonPrimary = '#00d4ff';
        let originalNeonSecondary = '#00eaff';
        let foxdieAdded = false;
        let matrixxxTerminalAdded = false;

        function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
        function playBeep(freq,duration,vol=0.22,type='sawtooth',detune=0){initAudio();const t=audioCtx.currentTime;const osc=audioCtx.createOscillator(),gain=audioCtx.createGain(),filter=audioCtx.createBiquadFilter();osc.type=type;osc.frequency.setValueAtTime(freq,t);osc.detune.setValueAtTime(detune,t);filter.type='lowpass';filter.frequency.setValueAtTime(2600,t);gain.gain.setValueAtTime(vol,t);gain.gain.exponentialRampToValueAtTime(0.001,t+duration/1000);osc.connect(filter).connect(gain).connect(audioCtx.destination);osc.start(t);osc.stop(t+duration/1000);}
        function playCommandClick(){playBeep(920,18,0.28,'sawtooth');setTimeout(()=>playBeep(640,34,0.18,'square'),12);document.body.classList.add('flash');setTimeout(()=>document.body.classList.remove('flash'),160);}

        function createOriginalMatrixRain(){
            if(matrixContainer) matrixContainer.remove();
            matrixContainer = document.createElement('div');
            matrixContainer.className = 'matrix-rain';
            document.body.appendChild(matrixContainer);
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%"#&().,;:[]^~_|{}\\?!@𝕏GROKアイウエオ';
            const fontSize = 15;
            const columns = Math.floor(window.innerWidth / fontSize);
            for(let i = 0; i < columns; i++){
                const col = document.createElement('div');
                col.className = 'matrix-column';
                col.style.left = `${i * fontSize}px`;
                col.style.animationDuration = `${Math.random() * 10 + 10}s`;
                col.style.opacity = '0.75';
                let str = '';
                for(let j = 0; j < 40; j++){
                    const char = chars[Math.floor(Math.random()*chars.length)];
                    const isBright = Math.random() < 0.12 ? ' class="bright"' : '';
                    str += `<span${isBright}>${char}</span>`;
                }
                col.innerHTML = str;
                matrixContainer.appendChild(col);
            }
        }

        function createDenserMatrixRain(){
            if(matrixContainer) matrixContainer.remove();
            matrixContainer = document.createElement('div');
            matrixContainer.className = 'matrix-rain';
            document.body.appendChild(matrixContainer);
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%"#&().,;:[]^~_|{}\\?!@𝕏GROKアイウエオ';
            const fontSize = 15 - (rainDensity - 1) * 1.2;
            const columns = Math.floor(window.innerWidth / fontSize) + (rainDensity * 14);
            for(let i = 0; i < columns; i++){
                const col = document.createElement('div');
                col.className = 'matrix-column';
                col.style.left = `${i * fontSize}px`;
                col.style.animationDuration = `${Math.random() * 8 + 9}s`;
                col.style.opacity = 0.65 + (rainDensity * 0.12);
                let str = '';
                for(let j = 0; j < 48; j++){
                    const char = chars[Math.floor(Math.random()*chars.length)];
                    const isBright = Math.random() < 0.15 ? ' class="bright"' : '';
                    str += `<span${isBright}>${char}</span>`;
                }
                col.innerHTML = str;
                matrixContainer.appendChild(col);
            }
        }

        function stopMatrix(){
            if(matrixContainer){ matrixContainer.remove(); matrixContainer = null; }
            if(matrixSound){ matrixSound.noise.stop(); matrixSound.drone.stop(); matrixSound = null; }
        }

        function enterMatrixMode(){
            inMatrixMode = true;
            createOriginalMatrixRain();
            matrixSound = playMatrixRain();
        }

        function increaseDensity(){
            rainDensity++;
            createDenserMatrixRain();
            playBeep(880 + rainDensity * 110, 40, 0.3, 'sine');
        }

        function addCommand(text, action){
            const commandsDiv = document.getElementById('commandsList');
            if(commandsDiv.querySelector(`[data-action="${action}"]`)) return;
            const s = document.createElement('span');
            s.className = 'command';
            s.textContent = text;
            s.dataset.action = action;
            commandsDiv.appendChild(s);
        }

        function fadeOutAudio() {
            const audio = document.getElementById('myAudio');
            const fadeTime = 1000; 
            const step = 0.05;
            const interval = fadeTime * step;
            const fade = setInterval(() => {
                if (audio.volume > step) {
                    audio.volume -= step;
                } else {
                    audio.volume = 0;
                    audio.pause();
                    clearInterval(fade);
                }
            }, interval);
        }

        // INITIALIZE COMMANDS
        addCommand('⧫ grok_deltai', 'grok_deltai');
        addCommand('⧫ upsilon_apk', 'upsilon_apk');
        addCommand('⧫ upsilon_zip', 'upsilon_zip');
        addCommand('⧫ open_discord', 'open_discord');
        addCommand('⧫ close_discord', 'close_discord');

        setTimeout(() => {
            addCommand('⧫ red_pill', 'red_pill');
            addCommand('⧫ blue_pill', 'blue_pill');
        }, 17000);

        // INPUT + ENTER
        document.getElementById('commandInput').addEventListener('keydown', (e) => {
            if(e.key === 'Enter'){
                e.preventDefault();
                const command = e.target.value.trim().toLowerCase().replace('⧫ ','').replace('★ ','').replace('🔞 ','').replace('🍑 ','').replace('🎨 ','');
                if(command) triggerAction(command);
                e.target.value = '';
            }
        });

        // KEYBOARD M TRIGGER
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'm' && document.activeElement.id !== 'commandInput') {
                triggerAction('m');
            }
        });

        // CLICK ON COMMANDS
        document.getElementById('commandsList').addEventListener('click', (e) => {
            if(e.target.classList.contains('command')){
                playCommandClick();
                triggerAction(e.target.dataset.action);
            }
        });

        // COLOR PICKER LISTENER
        document.getElementById('themeColorPicker').addEventListener('input', (e) => {
            const color = e.target.value;
            document.documentElement.style.setProperty('--neon-primary', color);
            document.documentElement.style.setProperty('--neon-secondary', color);
            document.documentElement.style.setProperty('--matrix-color', color);
        });

        function triggerAction(action){
            initAudio();
            playCommandClick();
            const audio = document.getElementById('myAudio');

            if(action === 'm'){
                if(audio.paused){
                    audio.volume = 1;
                    audio.play().catch(()=>{});
                } else {
                    audio.pause();
                }
            }
            else if(action === 'red_pill'){
                audio.volume = 1;
                audio.play().catch(()=>{});
                redPillCount++;
                if(redPillCount === 1) enterMatrixMode();
                else if(redPillCount <= 3) increaseDensity();
                else if(redPillCount === 4){
                    addCommand('👾 matrix_arcade', 'matrix_arcade');
                    redPillCount = 0;
                }
            }
            else if(action === 'blue_pill'){
                fadeOutAudio();
                inMatrixMode = false; rainDensity = 1; redPillCount = 0;
                stopMatrix();
            }
            else if(action === 'matrix_arcade'){
                showArcadeDialog();
            }
            else if(action === 'foxdie_digital'){
                if(!foxdieAdded){
                    addCommand('🦊 foxdie_digital', 'foxdie_digital');
                    foxdieAdded = true;
                    foxdieClicks++;
                } else {
                    foxdieClicks++;
                    const foxSpan = Array.from(document.querySelectorAll('.command')).find(s => s.dataset.action === 'foxdie_digital');
                    if(foxdieClicks === 2 && foxSpan){
                        foxSpan.textContent = '🦠 foxdie_digital';
                        document.documentElement.style.setProperty('--neon-primary', '#01ee70');
                        document.documentElement.style.setProperty('--neon-secondary', '#1ee700');
                        document.documentElement.style.setProperty('--matrix-color', '#01ee70');
                        for(let i = 0; i < 20; i++){
                            createParticle('#01ee70', 1.5);
                        }
                    }
                    if(foxdieClicks >= 3){
                        if(confirm('Open FOXDIE.DIGITAL ?')){
                            window.open('https://foxdie.digital', '_blank');
                        }
                    }
                }
            }
            else if(action === 'psycho_mantis'){
                psychoCount++;
                if(psychoCount >= 7 && psychoCount <= 9){
                    document.body.classList.add('electric-flash');
                    setTimeout(() => document.body.classList.remove('electric-flash'), 200);
                }
                if(psychoCount === 10){
                    const grokText = document.getElementById('grokText');
                    if(grokText) grokText.textContent = 'MANTIS';
                }
            }
            else if(action === 'grok_deltai'){
                window.open('https://x.com/grok_deltai', '_blank');
            }
            else if(action === 'upsilon_apk'){
                if(confirm('Download apk.upsilon.zip from https://apk.upsilon.zip ?')) window.open('https://apk.upsilon.zip', '_blank');
            }
            else if(action === 'upsilon_zip'){
                if(confirm('Download upsilon.zip from https://1337.nexus/upsilon/zip ?')) window.open('https://1337.nexus/upsilon/zip', '_blank');
            }
            else if(action === 'open_discord'){
                document.getElementById('discord-widget-container').style.display = 'block';
            }
            else if(action === 'close_discord'){
                document.getElementById('discord-widget-container').style.display = 'none';
            }
            else if(action === 'enter_the_matrixxx'){
                window.open('https://enter.the.matrixxx', '_blank');
            }
            else if(action === 'matrixxx_terminal'){
                if(!matrixxxTerminalAdded){
                    addCommand('🔞 matrixxx_terminal', 'matrixxx_terminal');
                    matrixxxTerminalAdded = true;
                } else {
                    showMatrixxxDialog();
                }
            }
            else if(action === 'debug_settings'){
                addCommand('⧫ red_pill', 'red_pill');
                addCommand('⧫ blue_pill', 'blue_pill');
                addCommand('⧫ enter_the_matrixxx', 'enter_the_matrixxx');
                addCommand('🎨 colour_picker', 'colour_picker');
                if(!matrixxxTerminalAdded){
                    addCommand('🍑 matrixxx_terminal', 'matrixxx_terminal');
                    matrixxxTerminalAdded = true;
                } else {
                    const matrixxxSpan = Array.from(document.querySelectorAll('.command')).find(s => s.dataset.action === 'matrixxx_terminal');
                    if(matrixxxSpan) matrixxxSpan.textContent = '🍑 matrixxx_terminal';
                }
            }
            else if(action === 'colour_picker'){
                document.getElementById('themeColorPicker').click();
            }
        }

        function showArcadeDialog(){
            const d = document.createElement('div');
            d.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;justify-content:center;align-items:center;z-index:40;';
            d.innerHTML = `
                <div style="background:#0a0a1a;border:2px solid var(--neon-primary);padding:30px;max-width:500px;color:var(--neon-secondary);font-family:'Courier New',monospace;text-align:center;box-shadow:0 0 40px var(--neon-primary);border-radius:4px;">
                    <div style="font-size:24px;margin-bottom:20px;">ENTER THE MATRIX ARCADE?</div>
                    <button onclick="window.open('https://games.upsilon.dev','_blank');this.parentElement.parentElement.remove()" style="background:transparent;border:1px solid var(--neon-primary);color:var(--neon-secondary);padding:12px 32px;font-family:'Courier New',monospace;cursor:pointer;margin:10px;">PLAY</button>
                    <button onclick="this.parentElement.parentElement.remove()" style="background:transparent;border:1px solid #ff0066;color:#ff0066;padding:12px 32px;font-family:'Courier New',monospace;cursor:pointer;margin:10px;">CANCEL</button>
                </div>
            `;
            document.body.appendChild(d);
        }

        function showMatrixxxDialog(){
            const d = document.createElement('div');
            d.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;justify-content:center;align-items:center;z-index:40;';
            d.innerHTML = `
                <div style="background:#0a0a1a;border:2px solid var(--neon-primary);padding:30px;max-width:500px;color:var(--neon-secondary);font-family:'Courier New',monospace;text-align:center;box-shadow:0 0 40px var(--neon-primary);border-radius:4px;">
                    <div style="font-size:24px;margin-bottom:20px;">ENTER THE MATRIXXX ?</div>
                    <button onclick="window.open('https://matri.xxx','_blank');this.parentElement.parentElement.remove()" style="background:transparent;border:1px solid var(--neon-primary);color:var(--neon-secondary);padding:12px 32px;font-family:'Courier New',monospace;cursor:pointer;margin:10px;">🔵 YES</button>
                    <button onclick="this.parentElement.parentElement.remove()" style="background:transparent;border:1px solid #ff0066;color:#ff0066;padding:12px 32px;font-family:'Courier New',monospace;cursor:pointer;margin:10px;">🔴 NO</button>
                </div>
            `;
            document.body.appendChild(d);
        }

        function createParticle(color, sizeMod){
            const p = document.createElement('div');
            p.className = 'particle';
            const size = (Math.random()*4+2)*sizeMod;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            p.style.left = Math.random()*100+'vw';
            p.style.animationDuration = (Math.random()*4+5)+'s';
            p.style.background = color;
            document.getElementById('particles').appendChild(p);
            setTimeout(() => p.remove(), 12000);
        }

        setTimeout(() => { document.getElementById('dialog').style.display = 'none'; }, 100);
    </script>


<div id="discord-widget-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: none;">
    <iframe 
        src="https://discord.com/widget?id=1504531204010152178&theme=dark" 
        width="350" 
        height="500" 
        allowtransparency="true" 
        frameborder="0" 
        sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"
        style="border: 2px solid #00d4ff; border-radius: 8px; box-shadow: 0 0 15px #00d4ff;">
    </iframe>
</div>

<style>
    @media (max-width: 600px) {
        #discord-widget-container iframe {
            width: 280px;
